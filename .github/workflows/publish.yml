name: Publish

on:
  push:
    paths:
      - '**/*'
      - '!.github/workflows/**'
      - '!README.md'
      - '!LICENSE'
    branches:
      - main
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Delete existing release
        uses: dev-drprasad/delete-tag-and-release@v1.0
        with:
          delete_release: true
          tag_name: releases
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: releases
          name: Releases
          body: "Latest build for all platforms."
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-raycast:
    needs: cleanup
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: install dependencies (raycast)
        working-directory: raycast
        run: npm install

      - name: build raycast extension
        working-directory: raycast
        run: npx ray build -e dist -o dist

      - name: package raycast extension
        shell: bash
        run: |
          cp raycast/icon.png raycast/dist/icon.png
          cp raycast/README.md raycast/dist/README.md
          cd raycast/dist
          zip -r ../../hostly-raycast-extension.zip .

      - name: upload raycast package
        uses: softprops/action-gh-release@v1
        with:
          tag_name: releases
          files: hostly-raycast-extension.zip
          token: ${{ secrets.GITHUB_TOKEN }}
          fail_on_unmatched_files: true

  publish-tauri:
    needs: cleanup
    permissions:
      contents: write
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "macos-latest"
            args: "--target aarch64-apple-darwin"
          - platform: "macos-latest"
            args: "--target x86_64-apple-darwin"
          - platform: "macos-latest"
            args: "--target universal-apple-darwin"
          - platform: "ubuntu-22.04"
            args: ""
          - platform: "windows-latest"
            args: ""
          - platform: "windows-latest"
            args: ""
            no_elevation: true

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'npm'

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: install Rust target
        shell: bash
        run: |
          if [[ "${{ matrix.args }}" == *"universal-apple-darwin"* ]]; then
            rustup target add x86_64-apple-darwin aarch64-apple-darwin
          elif [[ "${{ matrix.args }}" =~ --target\ ([^ ]+) ]]; then
            TARGET="${BASH_REMATCH[1]}"
            rustup target add $TARGET
          fi

      - name: install dependencies (frontend)
        run: npm install

      - name: install dependencies (linux only)
        if: contains(matrix.platform, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget libssl-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev

      - name: install UPX
        if: matrix.platform == 'windows-latest'
        run: choco install upx

      - name: Build Tauri App
        if: matrix.no_elevation != true
        uses: tauri-apps/tauri-action@v0
        id: tauri-build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: releases
          releaseName: 'Releases'
          releaseBody: |
            This is the latest build. / 这是最新构建版本。
            
            **Downloads / 下载:**
            See assets below. / 请见下方资源列表。
            
            ---
            **📱 MacOS Users (M1/M2/M3...)**: Please download the `_aarch64.dmg` file (aarch64 = arm64).
            **📱 MacOS 用户 (M1/M2/M3...)**: 请下载 `_aarch64.dmg` 文件 (即 arm64 版本)。
            
            ⚠️ **"App is damaged" Error? / "应用已损坏" 报错?**
            If you see "App is damaged and can't be opened", run this in Terminal:
            若打开时提示“应用已损坏，无法打开”，请在终端运行以下命令：
            ```bash
            xattr -cr /Applications/Hostly.app
            ```
            (Assuming you moved the app to the Applications folder / 假设您已将应用移动到了应用程序文件夹)
          releaseDraft: false
          prerelease: false

      - name: Build Hostly-Core (Standalone CLI)
        if: matrix.no_elevation != true
        shell: bash
        run: |
          if [[ "${{ matrix.args }}" == *"universal-apple-darwin"* ]]; then
            cargo build --release --bin hostly-core --target x86_64-apple-darwin
            cargo build --release --bin hostly-core --target aarch64-apple-darwin
            mkdir -p target/universal-apple-darwin/release
            lipo -create target/x86_64-apple-darwin/release/hostly-core target/aarch64-apple-darwin/release/hostly-core -output target/universal-apple-darwin/release/hostly-core
          else
            cargo build --release --bin hostly-core ${{ matrix.args }}
          fi
        working-directory: src-tauri

      - name: Build Tauri App (No Elevation)
        if: matrix.no_elevation == true
        shell: pwsh
        run: |
          npm run tauri -- build -- --no-default-features
          cp src-tauri/target/release/hostly.exe hostly-off-elevation.exe
          upx --best hostly-off-elevation.exe

      - name: Upload No-Elevation Artifact
        if: matrix.no_elevation == true
        uses: softprops/action-gh-release@v1
        with:
          tag_name: releases
          files: hostly-off-elevation.exe
          token: ${{ secrets.GITHUB_TOKEN }}
          fail_on_unmatched_files: true

      - name: Prepare Hostly-Core Path (Unix)
        if: matrix.platform != 'windows-latest'
        shell: bash
        run: |
          if [[ "${{ matrix.args }}" =~ --target\ ([^ ]+) ]]; then
            TARGET="${BASH_REMATCH[1]}"
            SRC="src-tauri/target/$TARGET/release/hostly-core"
          else
            SRC="src-tauri/target/release/hostly-core"
          fi
          
          if [[ "${{ matrix.platform }}" == "macos-latest" ]]; then
            if [[ "${{ matrix.args }}" == *"aarch64"* ]]; then DEST="hostly-core-macos-arm64"; fi
            if [[ "${{ matrix.args }}" == *"x86_64"* ]]; then DEST="hostly-core-macos-x64"; fi
            if [[ "${{ matrix.args }}" == *"universal"* ]]; then DEST="hostly-core-macos-universal"; fi
          elif [[ "${{ matrix.platform }}" == "ubuntu-22.04" ]]; then
            DEST="hostly-core-linux-x64"
          elif [[ "${{ matrix.platform }}" == "ubuntu-24.04-arm" ]]; then
            DEST="hostly-core-linux-arm64"
          fi
          cp "$SRC" "$DEST"

      - name: Prepare Hostly-Core Path (Windows)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          cp src-tauri/target/release/hostly-core.exe hostly-core-win-x64.exe

      - name: UPX Compress (Windows only)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          upx --best src-tauri/target/release/hostly.exe
          upx --best hostly-core-win-x64.exe

      - name: Upload Binaries
        uses: softprops/action-gh-release@v1
        with:
          tag_name: releases
          files: |
            src-tauri/target/release/hostly.exe
            hostly-core-win-x64.exe
            hostly-core-macos-arm64
            hostly-core-macos-x64
            hostly-core-macos-universal
            hostly-core-linux-x64
            hostly-core-linux-arm64
          token: ${{ secrets.GITHUB_TOKEN }}
          fail_on_unmatched_files: false
